name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate every JSON manifest parses
        run: |
          set -euo pipefail
          # Validate every tracked JSON file, not just a hand-picked subset.
          # If a manifest is added or moved, CI will pick it up automatically.
          mapfile -t files < <(git ls-files '*.json')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No JSON files tracked -- nothing to validate." >&2
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "  validating $f"
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done

      - name: Required files exist
        run: |
          set -e
          test -f mcp.json
          test -f .mcp.json
          test -f .cursor-plugin/plugin.json
          test -f .claude-plugin/plugin.json
          test -f .codex-plugin/plugin.json
          test -f rules/secure-llm-usage.mdc
          test -f rules/llm-security-review.mdc
          test -f skills/secure-llm-integration/SKILL.md
          test -f skills/promptguard-api/SKILL.md
          test -f commands/promptguard-scan.md
          test -f commands/promptguard-secure.md
          test -f agents/llm-security-reviewer.md
          test -f AGENTS.md

      - name: Plugin manifests share the same version
        # Drift between manifests is a common bug -- a publish that bumps
        # one but forgets the others. Catch it before it reaches users.
        run: |
          set -euo pipefail
          v_cursor=$(python3 -c "import json; print(json.load(open('.cursor-plugin/plugin.json'))['version'])")
          v_claude=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          v_codex=$(python3 -c "import json; print(json.load(open('.codex-plugin/plugin.json'))['version'])")
          echo "  cursor=$v_cursor  claude=$v_claude  codex=$v_codex"
          if [ "$v_cursor" != "$v_claude" ] || [ "$v_cursor" != "$v_codex" ]; then
            echo "::error::Plugin manifest versions are out of sync." >&2
            exit 1
          fi

      - name: MCP configs are byte-identical
        # mcp.json and .mcp.json must stay in sync (both are read by
        # different agent ecosystems). Drift here silently breaks one of them.
        run: diff -u mcp.json .mcp.json
